# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-vcs-permalinks
  - repo: https://github.com/tobinjt/rust-pre-commit-checks
    rev: v1.2.0
    hooks:
      - id: cargo-check
      - id: cargo-clippy
      - id: cargo-fmt
      - id: cargo-llvm-cov
        args:
          [
            # TODO: improve test coverage.
            # Debug missing coverage with:
            # cargo llvm-cov --text --show-missing-lines | rg -B 2 -F -e '^0' -e ' 0|'
            "--fail-uncovered-lines=10",
            "--fail-uncovered-functions=7",
            "--quiet",
            "--show-missing-lines",
          ]
      - id: cargo-test
      - id: check-tag-version
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--verbose]
  - repo: local
    hooks:
      - id: actionlint
        name: Run `actionlint`
        language: system
        types: [yaml]
        exclude: dependabot.yml|.*.yaml$
        entry: actionlint
