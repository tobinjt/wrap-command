#!/usr/bin/env -S make_rust_github_workflow --output_shell_completion wrap-command
name: Build binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          # 1. Linux (x86_64) - Debian compatible
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bin: wrap-command
            name: wrap-command-linux-x86_64.tar.gz

          # 2. macOS (x86_64 / Intel)
          - os_name: macOS-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bin: wrap-command
            name: wrap-command-macos-x86_64.tar.gz

          # 3. macOS (ARM64 / Apple Silicon)
          - os_name: macOS-ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: wrap-command
            name: wrap-command-macos-arm64.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.platform.target }}"

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package as archive
        shell: bash
        run: |
          # 1. Prepare staging
          mkdir staging
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} staging/
          cp README.md staging/ || true
          cp LICENSE staging/ || true

          # 1.1 Generate shell completions
          mkdir -p staging/completions
          BIN="target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}"

          $BIN --output_shell_completion bash       > staging/completions/wrap-command.bash
          $BIN --output_shell_completion elvish     > staging/completions/wrap-command.elv
          $BIN --output_shell_completion fish       > staging/completions/wrap-command.fish
          $BIN --output_shell_completion powershell > staging/completions/_wrap-command.ps1
          $BIN --output_shell_completion zsh        > staging/completions/_wrap-command


          # 2. Create the UNVERSIONED archive (e.g., wrap-command-linux-x86_64.tar.gz)
          cd staging
          tar czvf ../${{ matrix.platform.name }} *
          cd ..

          # 3. Create the VERSIONED archive (e.g., wrap-command-v1.0.0-linux-x86_64.tar.gz)
          # We take the base name defined in matrix (wrap-command-linux...) and inject the tag
          VERSIONED_NAME="${{ matrix.platform.name }}"
          VERSIONED_NAME="${VERSIONED_NAME/wrap-command-/wrap-command-${{ github.ref_name }}-}"

          cp ${{ matrix.platform.name }} $VERSIONED_NAME

          # Output names for debugging
          echo "Created: ${{ matrix.platform.name }}"
          echo "Created: $VERSIONED_NAME"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          # Upload everything ending in .tar.gz in the current directory
          name: ${{ matrix.platform.name }}-artifacts
          path: "*.tar.gz"
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
