#!/usr/bin/env -S "make_github_workflows"\_--extra-arg\_"cargo\_llvm-cov\_test=--fail-uncovered-lines=5\_--fail-uncovered-functions=7\_--show-missing-lines"
version: 2
updates:

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    groups:
      pre-commit:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7
